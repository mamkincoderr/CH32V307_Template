# OpenOCD configuration for CH32V307 via WCH-Link (MRS2)
source [find C:/MounRiver/MounRiver_Studio2/resources/app/resources/win32/components/WCH/OpenOCD/OpenOCD/scripts/wch/wch-riscv.cfg]

# Work area in SRAM
$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size 0x20000

# Flash: CH32V307 = 288K (0x48000)
$_TARGETNAME configure -flash-size 0x48000
flash bank $_FLASHNAME wch-nflash 0 0x00000000 0 0 0 $_TARGETNAME
